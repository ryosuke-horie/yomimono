version: 2
updates:
  # ルート（モノレポ共通）の依存関係を管理
  # pnpm workspace 全体を対象とし、複数ディレクトリで共通するパッケージを一括管理する
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "chore(root)"
      prefix-development: "chore(root-dev)"
      include: "scope"
    reviewers:
      - "ryosuke-horie"
    assignees:
      - "ryosuke-horie"
    groups:
      shared-tools:
        patterns:
          # モノレポ共通ツール（ルート package.json）
          - "lefthook"
          # 全ディレクトリ共通：静的解析・フォーマット・型チェック
          - "@biomejs/biome"
          - "knip"
          - "typescript"
          # api/frontend 共通：Cloudflare 関連デプロイツール
          - "wrangler"
          - "@cloudflare/workers-types"
          # api/frontend/extension 共通：Node.js 型定義
          - "@types/node"

  # apiディレクトリ固有の依存関係を管理
  # 共通パッケージはルート設定の shared-tools グループで一括管理するため、ここでは除外する
  - package-ecosystem: "npm"
    directory: "/api"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "chore(api)"
      prefix-development: "chore(api-dev)"
      include: "scope"
    reviewers:
      - "ryosuke-horie"
    assignees:
      - "ryosuke-horie"
    ignore:
      - dependency-name: "@biomejs/biome"
      - dependency-name: "knip"
      - dependency-name: "typescript"
      - dependency-name: "wrangler"
      - dependency-name: "@cloudflare/workers-types"
      - dependency-name: "@types/node"
    groups:
      api-deps:
        patterns:
          # コアとなる実行時依存パッケージ
          - "hono"
          - "drizzle-orm"
          - "drizzle-kit"
          - "dotenv"
          # データベース関連
          - "better-sqlite3"
          - "@types/better-sqlite3"
          # ビルドツール
          - "tsx"
      api-dev-deps:
        patterns:
          # テスト関連
          - "vitest"
          - "@vitest/*"
          - "happy-dom"
          # 開発ツール
          - "openapi3-ts"
          - "yaml"
          - "only-allow"
        update-types:
          - "major"
          - "minor"
          - "patch"

  # frontendディレクトリ固有の依存関係を管理
  # 共通パッケージはルート設定の shared-tools グループで一括管理するため、ここでは除外する
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "chore(frontend)"
      prefix-development: "chore(frontend-dev)"
      include: "scope"
    reviewers:
      - "ryosuke-horie"
    assignees:
      - "ryosuke-horie"
    ignore:
      - dependency-name: "@biomejs/biome"
      - dependency-name: "knip"
      - dependency-name: "typescript"
      - dependency-name: "wrangler"
      - dependency-name: "@cloudflare/workers-types"
      - dependency-name: "@types/node"
    groups:
      frontend-deps:
        patterns:
          # Reactとそのエコシステム
          - "next"
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
          - "@tanstack/react-query"
          - "react-icons"
          - "server-only"
          # Cloudflareデプロイメント（frontend固有）
          - "@opennextjs/cloudflare"
          # スタイリング関連
          - "tailwindcss"
          - "@tailwindcss/postcss"
          - "postcss"
          - "postcss-load-config"
          # コード生成ツール
          - "orval"
      frontend-dev-deps:
        patterns:
          # テスト関連
          - "vitest"
          - "@vitest/*"
          - "@testing-library/*"
          - "jsdom"
          # ビルドツール
          - "vite-tsconfig-paths"
          - "@vitejs/plugin-react"
        update-types:
          - "major"
          - "minor"
          - "patch"
